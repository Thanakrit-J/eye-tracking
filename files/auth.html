<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👁️ Eye Tracking System - ลงชื่อเข้า</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .auth-tab.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid;
            display: none;
        }

        .message.success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .message.info {
            background: #d1ecf1;
            border-color: #17a2b8;
            color: #0c5460;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>👁️ Eye Tracking</h1>

            <div id="authMessage" class="message"></div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
                <button class="auth-tab" onclick="switchTab('register')">สมัครสมาชิก</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginStudentId">รหัสนักเรียน:</label>
                    <input type="text" id="loginStudentId" placeholder="เช่น STU001" required>
                </div>
                <button type="submit" class="btn-auth">เข้าสู่ระบบ</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName">ชื่อ-นามสกุล:</label>
                    <input type="text" id="regName" placeholder="เช่น สมชาย ใจดี" required>
                </div>
                <div class="form-group">
                    <label for="regStudentId">รหัสนักเรียน:</label>
                    <input type="text" id="regStudentId" placeholder="เช่น STU001" required>
                </div>
                <div class="form-group">
                    <label for="regGrade">ชั้นเรียน:</label>
                    <select id="regGrade" required>
                        <option value="">-- เลือกชั้นเรียน --</option>
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <button type="submit" class="btn-auth">สมัครสมาชิก</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
